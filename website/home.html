<!DOCTYPE html>
<html>
<head>
<style>
body {
    background: #f4ebd0;
    font-family: Arial;
    margin: 0;
}

.hero {
    background: #122620;
    color: #f4ebd0;
    padding: 60px;
    text-align: center;
}

.hero h2 {
    font-size: 36px;
}

.hero p {
    margin: 20px 0;
}

.btn {
    background: #d6ad60;
    color: #122620;
    padding: 12px 20px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.section {
    padding: 30px;
    text-align: center;
}
</style>
</head>

<body>

<div class="hero">
    <h2>Hire Top Freelancers</h2>
    <p>Design, Development, Marketing — all in one place</p>
    <button class="btn">Get Started</button>
</div>

<div class="section">
    <h3>Our Services</h3>
    <p>Web Design | App Development | Branding</p>
</div>

</body>
</html>
