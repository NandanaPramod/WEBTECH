<!DOCTYPE html>
<html>
<head>
<title>Employee</title>

<style>
table {
    width:80%;
    margin:auto;
    border-collapse:collapse;
}
th, td {
    border:1px solid #000;
    padding:10px;
    text-align:center;
}
</style>

</head>

<body style="text-align:center; background:#f4ebd0;">

<h2>Employee Details</h2>

<button onclick="show()">Display Employees</button>
<button onclick="total()">Total Salary</button>

<table id="table">
<tr>
<th>ID</th><th>Name</th><th>Role</th><th>Salary</th>
</tr>
</table>

<h3 id="sum"></h3>

<script>

var employees = [
{ id:1, name:"Arun", role:"Manager", salary:50000 },
{ id:2, name:"Divya", role:"Developer", salary:40000 },
{ id:3, name:"Karthik", role:"Tester", salary:30000 }
];

function show(){
    var t = document.getElementById("table");

    if(t.rows.length > 1) return;

    employees.forEach(e=>{
        var row = t.insertRow();
        row.insertCell(0).innerHTML = e.id;
        row.insertCell(1).innerHTML = e.name;
        row.insertCell(2).innerHTML = e.role;
        row.insertCell(3).innerHTML = e.salary;
    });
}

function total(){
    var sum = 0;
    employees.forEach(e=> sum += e.salary);

    document.getElementById("sum").innerHTML =
        "Total Salary: ₹ " + sum;
}

</script>

</body>
</html>
