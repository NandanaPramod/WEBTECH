<!DOCTYPE html>
<html>
<head>
<style>
body {
    font-family: Arial;
    background: #f4ebd0;
    text-align: center;
}

.form-box {
    margin-top: 50px;
    display: inline-block;
    padding: 20px;
    background: white;
    border-radius: 8px;
}

input {
    padding: 10px;
    margin: 10px;
    width: 200px;
}

button {
    background: #d6ad60;
    border: none;
    padding: 10px 20px;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>Login</h2>

<div class="form-box">
    <form>
        <input type="text" placeholder="Username"><br>
        <input type="password" placeholder="Password"><br>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
